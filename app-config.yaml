catalog:
  providers:
    azure-key-vault-provider:
      schedule: 
        frequency: { seconds: 60}
        timeout: { seconds: 3 }
    azure-devOps-build-pipeline-provider:
      schedule: 
        frequency: { seconds: 60}
        timeout: { seconds: 3 }
    azureDevOps:
      admgroup-az-devops-provider:
        organization: adm-group
        project: '*'
        repository: '*' # this will match all repos starting with service-*
        path: '*catalog-info.yaml'
        schedule: # optional; same options as in TaskScheduleDefinition
          # supports cron, ISO duration, "human duration" as used in code
          frequency: { minutes: 1 }
          # supports ISO duration, "human duration" as used in code
          timeout: { minutes: 3 }
  locations:
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow:
            - User
            - Group

  rules:
    - allow: [Component, System, API, Resource, Location, Domain, User, Group]
