name: Build Pipeline

on:
  push:
    branches:
      - main

env:
  BUILD_ID: build-${{ github.run_number }}
  RELEASE_NAME: backstage
  NAMESPACE: backstage-production
  CHART_PATH: .charts/backstage
  CHART_VERSION: 1.0.0

jobs:
# -------------------------------
# 🚀 BUILD & UPLOAD TO S3
# -------------------------------
  build-react:
    name: React Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Force Yarn version
        run: corepack prepare yarn@4.4.1 --activate

      - name: Install dependencies
        run: |
          yarn add simple-git
          yarn add xml2js
          yarn install --frozen-lockfile

      - name: Generate TS types
        run: yarn tsc

      - name: Build Backstage
        run: |
          cp app-config.production.yaml packages/backend
          yarn build:backend --config app-config.production.yaml

      - name: Copy built dependencies
        run: |
          mkdir -p artifacts
          cp yarn.lock artifacts/
          cp package.json artifacts/
          cp -rf catalog-model artifacts/

      - name: Extract required compressed build dependencies
        run: |
          tar -xzf packages/backend/dist/skeleton.tar.gz -C artifacts

      - name: Install production Yarn dependencies
        run: |
          cd artifacts
          yarn install --no-immutable
          yarn workspaces focus --all --production

      - name: Extract built Backstage
        run: |
          tar -xzf packages/backend/dist/bundle.tar.gz -C artifacts

      - name: Copy build artifacts
        run: |
          cp app-config.production.yaml artifacts/app-config.yaml
          cp -rf node_modules artifacts/
          cp -rf catalog-model artifacts/

      - name: Compress build
        run: |
          cd artifacts
          zip -r ../${BUILD_ID}.zip .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to AWS S3
        run: |
          aws s3 cp "${BUILD_ID}.zip" "s3://${{ secrets.S3_BUCKET }}/${BUILD_ID}.zip"

# -------------------------------
# 🚀 DEPLOY FROM S3 TO EKS
# -------------------------------

  deploy:
    needs: build-react
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -o kubectl https://amazon-eks.s3.us-west-2.amazonaws.com/1.29.0/2024-01-04/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Helm Upgrade
        run: |
          helm upgrade $RELEASE_NAME $CHART_PATH \
            --install \
            --namespace $NAMESPACE \
            --create-namespace \
            --version $CHART_VERSION \
            --debug \
            --reset-values \
            --set tags.app=${{ github.event.workflow_run.id }} \
            --set environment=production \
            -f $CHART_PATH/app-config.production.yaml
